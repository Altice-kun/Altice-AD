<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Altice Ads</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      border-radius: 10px;
    }

    button:hover {
      animation: buttonhover 0.4s;
      background: #3d79fc;
      font-size: 1.3em;
      padding: 8px 13px;
      border: none;
      border-radius: 13px;
      cursor: pointer;
    }

    button:hover:disabled {
      animation: unbuttonhover 0.4s
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

        @keyframes buttonhover {
          0% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

           100%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
        }

        @keyframes unbuttonhover {
           0%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
           
           100% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}
        }
    
  </style>
</head>
<body>
  <h2>お問い合わせ先</h2>
  <button onclick="mail()">メールでお問い合わせ</button>
  <p></p>
  <footer>
    <p>&copy; 2026 Altice. All rights reserved.</p>
      <ul>
       <li><a href="https://altice-kun.github.io/Altice-AD/privacy-policy.html">プライバシーポリシー</a></li>
       <li><a href="https://altice-kun.github.io/Altice-AD/contact.html">お問い合わせ</a></li>
      </ul>
    </footer>
</body>
