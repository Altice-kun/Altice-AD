<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ad Server Admin</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #111827;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: white;
    }

    button {
      margin-top: 10px;
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4f46e5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .ad {
      background: #0b1220;
      border-radius: 10px;
      overflow: hidden;
      padding-bottom: 10px;
      cursor: pointer;
    }

    .ad img {
      width: 100%;
      display: block;
    }

    .meta {
      font-size: 12px;
      padding: 6px 10px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
    }

    .label {
      font-size: 10px;
      padding: 0 10px;
      color: #60a5fa;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>広告管理画面</h1>

  <div class="card">
    <h3>広告追加（GitHub Raw自動化）</h3>

    <input type="file" id="file" />
    <input type="text" id="url" placeholder="広告リンクURL" />

    <button onclick="uploadAd()">広告登録</button>
  </div>

  <div class="card">
    <h3>広告一覧</h3>
    <button onclick="loadAds()">更新</button>
    <div id="list" class="grid"></div>
  </div>

</div>

<script>
const API = "https://ad-server.altice-net.workers.dev";

async function uploadAd() {
  const file = document.getElementById("file").files[0];
  const url = document.getElementById("url").value;

  if (!file || !url) {
    alert("画像とURLを入力してください");
    return;
  }

  const reader = new FileReader();

  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];

    const res = await fetch(API + "/upload-ad", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        image: base64,
        url: url
      })
    });

    alert(await res.text());
    loadAds();
  };

  reader.readAsDataURL(file);
}

async function loadAds() {
  const res = await fetch(API + "/list");
  const ads = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  ads.forEach(ad => {
    const ctr = ad.views > 0 ? ((ad.clicks / ad.views) * 100).toFixed(2) : 0;

    const div = document.createElement("div");
    div.className = "ad";

    div.innerHTML = `
      <img src="${ad.image}" />
      <div class="meta">
        <span>views: ${ad.views}</span>
        <span>CTR: ${ctr}%</span>
      </div>
      <div class="label">Sponsored</div>
    `;

    list.appendChild(div);
  });
}

loadAds();
</script>

</body>
</html>
