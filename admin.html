<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Ad Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 500px;
      margin: auto;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .ad {
      margin-top: 15px;
      padding: 10px;
      background: #1f2937;
      border-radius: 8px;
    }

    img {
      width: 100%;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="box" id="loginBox">
  <h2>ログイン</h2>
  <input id="email" placeholder="メールアドレス">
  <button onclick="login()">ログイン</button>
</div>

<div class="box" id="adminBox" style="display:none;">
  <h2>広告管理</h2>

  <input type="file" id="imageFile">
  <input id="url" placeholder="リンクURL">
  <button onclick="uploadAd()">広告追加</button>

  <h3>広告一覧</h3>
  <div id="list"></div>
</div>

<script>
const API = "https://ad-server.altice-net.workers.dev";

// =====================
// ログイン
// =====================
async function login() {
  const email = document.getElementById("email").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ email })
  });

  if (res.ok) {
    init();
  } else {
    alert("ログイン失敗");
  }
}

// =====================
// セッション確認
// =====================
async function init() {
  const res = await fetch(API + "/me", {
    credentials: "include"
  });

  if (res.ok) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminBox").style.display = "block";
    loadAds();
  }
}

// =====================
// 広告一覧
// =====================
async function loadAds() {
  const res = await fetch(API + "/list", {
    credentials: "include"
  });

  const data = await res.json();

  const el = document.getElementById("list");
  el.innerHTML = "";

  data.forEach(ad => {
    const ctr = ad.views > 0 ? (ad.clicks / ad.views * 100).toFixed(2) : 0;

    el.innerHTML += `
      <div class="ad">
        <img src="${ad.image}">
        <div>URL: ${ad.url}</div>
        <div>Views: ${ad.views}</div>
        <div>Clicks: ${ad.clicks}</div>
        <div>CTR: ${ctr}%</div>
      </div>
    `;
  });
}

// =====================
// 画像アップロード
// =====================
async function uploadAd() {
  const file = document.getElementById("imageFile").files[0];
  const url = document.getElementById("url").value;

  if (!file || !url) {
    alert("入力不足");
    return;
  }

  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];

    const res = await fetch(API + "/upload-ad", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({
        image: base64,
        url: url
      })
    });

    if (res.ok) {
      alert("追加成功");
      loadAds();
    } else {
      alert("失敗");
    }
  };

  reader.readAsDataURL(file);
}

// 初期チェック
init();
</script>

</body>
</html>
