<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Altice Ads 管理</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      border-radius: 10px;
    }

    button:hover {
      animation: buttonhover 0.4s;
      background: #3d79fc;
      font-size: 1.3em;
      padding: 8px 13px;
      border: none;
      border-radius: 13px;
      cursor: pointer;
    }

    button:hover:disabled {
      animation: unbuttonhover 0.4s
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    @keyframes buttonhover {
      0% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

      100%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
    }

    @keyframes unbuttonhover {
           0%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
           
           100% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

      /* 全体の枠 */
  .ticker-wrap {
    width: 100%;
    overflow: hidden; /* はみ出た文字を隠す */
    background: #000;
    color: #0f0; /* 電光掲示板風の緑 */
    padding: 10px 0;
    font-family: monospace;
  }

  /* 流れる中身のコンテナ */
  .ticker {
    display: flex;
    white-space: nowrap;
    width: max-content; /* 中身の幅に合わせる */
    animation: scroll 20s linear infinite; /* 20秒でループ */
  }

  /* 各銘柄のスタイル */
  .ticker-item {
    padding: 0 2rem;
    font-size: 1.2rem;
    font-weight: bold;
  }

  /* アニメーションの設定 */
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); } /* 半分まで行ったらループ */
  }
  </style>
</head>
<body>

<h1>Altice-AD</h1>
<p></p>

<div class="ticker-wrap">
  <div class="ticker">
    <!-- 同じ内容を2回繰り返すことで継ぎ目をなくす -->
    <div class="ticker-item">500表示まで無料</div>
    <div class="ticker-item">速攻登録、即時公開</div>
    <div class="ticker-item">登録最短１分以内</div>
    <div class="ticker-item">ログイン情報以外の登録不必要</div>
    
    <!-- ループを滑らかにするため複製 -->
    <!-- 同じ内容を2回繰り返すことで継ぎ目をなくす -->
    <div class="ticker-item">500表示まで無料</div>
    <div class="ticker-item">速攻登録、即時公開</div>
    <div class="ticker-item">登録最短１分以内</div>
    <div class="ticker-item">ログイン情報以外の登録不必要</div>
  </div>
</div>
  
<script>
const API = "https://xxxxx.workers.dev"; // ←自分のURL

// 静的ページでも、これだけの短いコードで「無限ループの継ぎ目」を自動作成できます
    const ticker = document.getElementById('js-ticker');
    // 中身をコピーして後ろに結合（これでループが途切れない）
    ticker.innerHTML += ticker.innerHTML;
  
function addAd() {
  const image = document.getElementById("image").value;
  const url = document.getElementById("url").value;

  await fetch(API + "/add", {
    method: "POST",
    body: JSON.stringify({ image, url })
  });

  loadAds();
}

async function loadAds() {
  const res = await fetch(API + "/list");
  const ads = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  ads.forEach(ad => {
    const li = document.createElement("li");
    li.innerHTML = `<img src="${ad.image}" width="200"> <a href="${ad.url}">${ad.url}</a>`;
    list.appendChild(li);
  });
}

loadAds();
</script>

</body>
</html>
