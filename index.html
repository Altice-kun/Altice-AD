<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Altice Ads 管理</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      border-radius: 10px;
    }

    button:hover {
      animation: buttonhover 0.4s;
      background: #3d79fc;
      font-size: 1.3em;
      padding: 8px 13px;
      border: none;
      border-radius: 13px;
      cursor: pointer;
    }

    button:hover:disabled {
      animation: unbuttonhover 0.4s
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    @keyframes buttonhover {
      0% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

      100%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
    }

    @keyframes unbuttonhover {
           0%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
           
           100% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

/* 掲示板の外枠 */
.ticker-board {
    width: 100%;
    overflow: hidden;
    background: #000; /* ここだけ背景を黒にする */
    margin: 20px 0;   /* 上下に少しスキマを作る */
}

/* 流れるアニメーションの箱 */
.ticker-flow {
    display: flex;
    width: max-content;
    animation: ticker-loop 20s linear infinite;
}

/* 文字の見た目 */
.ticker-text {
    color: #00ff00;
    font-family: monospace;
    font-size: 24px;
    font-weight: bold;
    padding-right: 100px; /* 文言の間の距離 */
    white-space: nowrap;
}

/* アニメーション本体 */
@keyframes ticker-loop {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}
    
  </style>
</head>
<body>

<h1>Altice-AD</h1>
<p></p>

<div class="ticker-board">
    <div class="ticker-flow" id="js-ticker-copy">
        <span class="ticker-text">500表示まで無料</span>
        <span class="ticker-text">速攻登録、即時公開</span>
        <span class="ticker-text">登録最短１分以内</span>
        <span class="ticker-text">ログイン情報以外の登録不必要</span>
    </div>
</div>
  
<script>
const API = "https://xxxxx.workers.dev"; // ←自分のURL

  // ページが完全に読み込まれてから実行する設定
  window.addEventListener('load', function() {
    const target = document.getElementById('myTicker');
    if (target) {
      target.innerHTML += target.innerHTML; // 中身を2倍にして無限ループ
    }
  });
  
function addAd() {
  const image = document.getElementById("image").value;
  const url = document.getElementById("url").value;

  await fetch(API + "/add", {
    method: "POST",
    body: JSON.stringify({ image, url })
  });

  loadAds();
}

async function loadAds() {
  const res = await fetch(API + "/list");
  const ads = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  ads.forEach(ad => {
    const li = document.createElement("li");
    li.innerHTML = `<img src="${ad.image}" width="200"> <a href="${ad.url}">${ad.url}</a>`;
    list.appendChild(li);
  });
}

loadAds();
</script>

</body>
</html>
