<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Altice Ads 管理</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      border-radius: 10px;
    }

    button:hover {
      animation: buttonhover 0.4s;
      background: #3d79fc;
      font-size: 1.3em;
      padding: 8px 13px;
      border: none;
      border-radius: 13px;
      cursor: pointer;
    }

    button:hover:disabled {
      animation: unbuttonhover 0.4s
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

        @keyframes buttonhover {
          0% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

           100%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
        }

        @keyframes unbuttonhover {
           0%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
           
           100% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}
        }

.card {
  width: 300px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: 0.3s;
  display: flex;       /* 横並びにする */
  flex-wrap: wrap;    /* 幅が足りない時に自動で折り返す */
  gap: 20px;          /* カード同士の隙間 */
  justify-content: center; /* 中央寄せにする場合 */
}

.card:hover {
  transform: translateY(-5px); /* ホバー時に少し上に移動 */
}

.card-img {
  width: 100%;
  height: auto;
  display: block;
}

.card-content {
  padding: 1rem;
}

    
  </style>
</head>
<body>

<h1>Altice-AD</h1>
<p></p>

<div class="container"> <!-- 追加：ここから -->
<div class="card">
  <div class="card-content">
    <h2 class="card-title">登録最短1分以内</h2>
    <p class="card-description">ユーザー名、氏名、メールアドレス、パスワードで登録するだけ!!</p>
  </div>
</div>
<div class="card">
  <div class="card-content">
    <h2 class="card-title">500表示まで無料</h2>
    <p class="card-description">Altice-ADでは、各広告登録契約につき500表示まで無料です!!</p>
  </div>
</div>
<div class="card">
  <div class="card-content">
    <h2 class="card-title">安心安全の超セキュリティ</h2>
    <p class="card-description">独自のセキュリティとCloudflare Workerによるバックエンドによる高セキュリティ!!</p>
  </div>
</div>
<div class="card">
  <div class="card-content">
    <h2 class="card-title">表示API無料</h2>
    <p class="card-description">ページ等への広告表示APIは、いつでも無料!!</p>
  </div>
</div>
</div>
  
<script>
const API = "https://xxxxx.workers.dev"; // ←自分のURL

  // ページが完全に読み込まれてから実行する設定
  window.addEventListener('load', function() {
    const target = document.getElementById('myTicker');
    if (target) {
      target.innerHTML += target.innerHTML; // 中身を2倍にして無限ループ
    }
  });
  
function addAd() {
  const image = document.getElementById("image").value;
  const url = document.getElementById("url").value;

  await fetch(API + "/add", {
    method: "POST",
    body: JSON.stringify({ image, url })
  });

  loadAds();
}

async function loadAds() {
  const res = await fetch(API + "/list");
  const ads = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  ads.forEach(ad => {
    const li = document.createElement("li");
    li.innerHTML = `<img src="${ad.image}" width="200"> <a href="${ad.url}">${ad.url}</a>`;
    list.appendChild(li);
  });
}

loadAds();
</script>

</body>
</html>
