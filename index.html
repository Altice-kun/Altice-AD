<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Altice Ads 管理</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      border-radius: 10px;
    }

    button:hover {
      animation: buttonhover 0.4s;
      background: #3d79fc;
      font-size: 1.3em;
      padding: 8px 13px;
      border: none;
      border-radius: 13px;
      cursor: pointer;
    }

    button:hover:disabled {
      animation: unbuttonhover 0.4s
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    @keyframes buttonhover {
      0% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

      100%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
    }

    @keyframes unbuttonhover {
           0%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
           
           100% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

        /* 外枠 */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: #000; /* 黒背景 */
            padding: 12px 0;
        }

        /* 流れる中身 */
        .ticker-content {
            display: flex;
            width: max-content;
            animation: scroll-left 15s linear infinite; /* 15秒で一周 */
        }

        /* テキストのスタイル */
        .msg {
            color: #00ff00; /* 電光掲示板っぽい緑 */
            font-family: sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            white-space: nowrap;
            padding-right: 50px; /* 文言のあとのスキマ */
        }

        /* ループ用のアニメーション */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    
  </style>
</head>
<body>

<h1>Altice-AD</h1>
<p></p>

<div class="ticker-wrap">
  <div class="ticker">
    <!-- 同じ内容を2回繰り返すことで継ぎ目をなくす -->
    <div class="ticker-item">500表示まで無料</div>
    <div class="ticker-item">速攻登録、即時公開</div>
    <div class="ticker-item">登録最短１分以内</div>
    <div class="ticker-item">ログイン情報以外の登録不必要</div>
    
    <!-- ループを滑らかにするため複製 -->
    <!-- 同じ内容を2回繰り返すことで継ぎ目をなくす -->
    <div class="ticker-item">500表示まで無料</div>
    <div class="ticker-item">速攻登録、即時公開</div>
    <div class="ticker-item">登録最短１分以内</div>
    <div class="ticker-item">ログイン情報以外の登録不必要</div>
  </div>
</div>
  
<script>
const API = "https://xxxxx.workers.dev"; // ←自分のURL

    // 自動で内容を2倍にして無限ループを繋げます
    const content = document.getElementById('loop-text');
    content.innerHTML += content.innerHTML;
  
function addAd() {
  const image = document.getElementById("image").value;
  const url = document.getElementById("url").value;

  await fetch(API + "/add", {
    method: "POST",
    body: JSON.stringify({ image, url })
  });

  loadAds();
}

async function loadAds() {
  const res = await fetch(API + "/list");
  const ads = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  ads.forEach(ad => {
    const li = document.createElement("li");
    li.innerHTML = `<img src="${ad.image}" width="200"> <a href="${ad.url}">${ad.url}</a>`;
    list.appendChild(li);
  });
}

loadAds();
</script>

</body>
</html>
