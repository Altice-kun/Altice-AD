<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Altice Ads 管理</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      border-radius: 10px;
    }

    button:hover {
      animation: buttonhover 0.4s;
      background: #3d79fc;
      font-size: 1.3em;
      padding: 8px 13px;
      border: none;
      border-radius: 13px;
      cursor: pointer;
    }

    button:hover:disabled {
      animation: unbuttonhover 0.4s
      font-size: 1.2em;
      padding: 5px 10px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

        @keyframes buttonhover {
          0% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}

           100%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
        }

        @keyframes unbuttonhover {
           0%{background: #3d79fc;
           font-size: 1.3em;
           padding: 8px 13px;
           border: none;
           border-radius: 13px;
           cursor: pointer;}
           
           100% { font-size: 1.2em;
           padding: 5px 10px;
           border: none;
           background: #2563eb;
           color: white;
           border-radius: 10px;}
        }

        .fade-text-container {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            position: relative;
        }

        /* アニメーションの設定 */
        .fade-text {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            opacity: 0;
            animation: fadeLoop 9s infinite; /* 3秒×3単語 = 9秒 */
        }

        /* 各単語の開始タイミングをずらす */
        .fade-text:nth-child(1) { animation-delay: 0s; }
        .fade-text:nth-child(2) { animation-delay: 3s; }
        .fade-text:nth-child(3) { animation-delay: 6s; }
        .fade-text:nth-child(3) { animation-delay: 9s; }

        @keyframes fadeLoop {
            0% { opacity: 0; }
            10% { opacity: 1; }  /* 表示 */
            30% { opacity: 1; }  /* 維持 */
            40% { opacity: 0; }  /* 消える */
            100% { opacity: 0; }
        }

    
  </style>
</head>
<body>

<h1>Altice-AD</h1>
<p></p>

<div class="fade-text-container">
    <div class="ticker-flow" id="js-ticker-copy">
        <span class="fade-text">500表示まで無料</span>
        <span class="fade-text">速攻登録、即時公開</span>
        <span class="fade-text">登録最短１分以内</span>
        <span class="fade-text">ログイン情報以外の登録不必要</span>
    </div>
</div>
  
<script>
const API = "https://xxxxx.workers.dev"; // ←自分のURL

  // ページが完全に読み込まれてから実行する設定
  window.addEventListener('load', function() {
    const target = document.getElementById('myTicker');
    if (target) {
      target.innerHTML += target.innerHTML; // 中身を2倍にして無限ループ
    }
  });
  
function addAd() {
  const image = document.getElementById("image").value;
  const url = document.getElementById("url").value;

  await fetch(API + "/add", {
    method: "POST",
    body: JSON.stringify({ image, url })
  });

  loadAds();
}

async function loadAds() {
  const res = await fetch(API + "/list");
  const ads = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  ads.forEach(ad => {
    const li = document.createElement("li");
    li.innerHTML = `<img src="${ad.image}" width="200"> <a href="${ad.url}">${ad.url}</a>`;
    list.appendChild(li);
  });
}

loadAds();
</script>

</body>
</html>
